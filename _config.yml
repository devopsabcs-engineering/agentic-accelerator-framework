title: Agentic Accelerator Framework
description: >-
  A comprehensive framework leveraging custom GitHub Copilot agents,
  GitHub Advanced Security, and Microsoft Defender for Cloud to shift
  security and compliance left across security, accessibility, code quality,
  and FinOps domains with SARIF-based CI/CD integration.
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme

# Exclude non-doc files from the Jekyll build
exclude:
  - node_modules
  - sample-app
  - scripts
  - .venv
  - "*.json"
  - "*.yml"
  - "!_config.yml"
  - LICENSE
  - Gemfile
  - Gemfile.lock
