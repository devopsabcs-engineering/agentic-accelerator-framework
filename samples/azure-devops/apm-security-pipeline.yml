# APM Security Scan — Sample Azure DevOps Pipeline
# Scans agent configuration files for security violations using a 4-engine architecture.
# Reference pipeline for the APM Security domain of the Agentic Accelerator Framework.

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - 'apm.yml'
      - 'apm.lock.yaml'
      - 'agents/**'
      - 'instructions/**'
      - 'prompts/**'
      - 'skills/**'
      - 'mcp.json'

pr:
  branches:
    include:
      - main
  paths:
    include:
      - 'apm.yml'
      - 'apm.lock.yaml'
      - 'agents/**'
      - 'instructions/**'
      - 'prompts/**'
      - 'skills/**'
      - 'mcp.json'

pool:
  vmImage: ubuntu-latest

stages:
  - stage: APMAudit
    displayName: 'Engine 1+2: Unicode & Lockfile'
    jobs:
      - job: ApmAudit
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'

          - script: |
              pip install apm-cli
              apm audit -f sarif -o $(Build.ArtifactStagingDirectory)/apm-audit.sarif
            displayName: 'Run APM Audit'

          - task: AdvancedSecurity-Publish@1
            inputs:
              SarifPath: '$(Build.ArtifactStagingDirectory)/apm-audit.sarif'

  - stage: SemanticScan
    displayName: 'Engine 3: Semantic Patterns'
    dependsOn: []
    jobs:
      - job: SemanticScan
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'

          - script: |
              python src/converters/semantic-to-sarif.py --output $(Build.ArtifactStagingDirectory)/semantic.sarif
            displayName: 'Run Semantic Scanner'

          - task: AdvancedSecurity-Publish@1
            inputs:
              SarifPath: '$(Build.ArtifactStagingDirectory)/semantic.sarif'

  - stage: MCPValidation
    displayName: 'Engine 4: MCP Configuration'
    dependsOn: []
    jobs:
      - job: MCPValidation
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'

          - script: |
              python src/converters/mcp-to-sarif.py --output $(Build.ArtifactStagingDirectory)/mcp.sarif
            displayName: 'Run MCP Validator'

          - task: AdvancedSecurity-Publish@1
            inputs:
              SarifPath: '$(Build.ArtifactStagingDirectory)/mcp.sarif'
