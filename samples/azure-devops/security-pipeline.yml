# Azure DevOps Security Pipeline
# Equivalent of .github/workflows/security-scan.yml
# Covers: SAST (CodeQL), SCA (dependency scanning), IaC (MSDO), container scanning, DAST (ZAP)
# Requires: GHAzDO enabled at the project or repository level
# Work item: AB#2075

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  - name: DAST_TARGET_URL
    value: ''  # Set to application URL to enable DAST stage

stages:
  # ---------------------------------------------------------------------------
  # Stage 1: SAST - CodeQL Analysis
  # ---------------------------------------------------------------------------
  - stage: SAST
    displayName: SAST - CodeQL Analysis
    jobs:
      - job: CodeQL
        displayName: CodeQL Scan
        steps:
          - checkout: self

          - task: AdvancedSecurity-Codeql-Init@1
            displayName: Initialize CodeQL
            inputs:
              languages: javascript
              querysuite: security-extended

          - task: AdvancedSecurity-Codeql-Analyze@1
            displayName: Run CodeQL Analysis

  # ---------------------------------------------------------------------------
  # Stage 2: SCA - Dependency Scanning
  # ---------------------------------------------------------------------------
  - stage: SCA
    displayName: SCA - Dependency Scanning
    dependsOn: []
    jobs:
      - job: DependencyScan
        displayName: Dependency Scan
        steps:
          - checkout: self

          - task: AdvancedSecurity-Dependency-Scanning@1
            displayName: Dependency Scanning

  # ---------------------------------------------------------------------------
  # Stage 3: IaC - Microsoft Security DevOps
  # ---------------------------------------------------------------------------
  - stage: IaC
    displayName: IaC - Security DevOps
    dependsOn: []
    jobs:
      - job: MSDO
        displayName: MSDO IaC Scan
        steps:
          - checkout: self

          - task: MicrosoftSecurityDevOps@1
            displayName: Microsoft Security DevOps
            inputs:
              categories: IaC
              tools: checkov,trivy,terrascan

          - task: AdvancedSecurity-Publish@1
            displayName: Publish IaC SARIF
            condition: always()
            inputs:
              sarifFile: $(Build.ArtifactStagingDirectory)/*.sarif

  # ---------------------------------------------------------------------------
  # Stage 4: Container - Trivy Image Scan
  # ---------------------------------------------------------------------------
  - stage: Container
    displayName: Container - Image Scan
    dependsOn: []
    condition: |
      and(
        succeeded(),
        ne(variables['Build.Reason'], 'Schedule')
      )
    jobs:
      - job: ContainerScan
        displayName: Trivy Container Scan
        steps:
          - checkout: self

          - script: |
              DOCKERFILE=$(find . -name 'Dockerfile' -type f | head -1)
              if [ -n "$DOCKERFILE" ]; then
                docker build -t scan-target:latest -f "$DOCKERFILE" .
              else
                echo "##vso[task.logissue type=warning]No Dockerfile found, skipping container scan"
                echo "##vso[task.setvariable variable=skipContainerScan]true"
              fi
            displayName: Build container image

          - script: |
              if [ "$(skipContainerScan)" != "true" ]; then
                curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
                trivy image \
                  --format sarif \
                  --output trivy-container.sarif \
                  --severity CRITICAL,HIGH \
                  scan-target:latest
              fi
            displayName: Run Trivy container scan

          - task: AdvancedSecurity-Publish@1
            displayName: Publish Container SARIF
            condition: |
              and(
                always(),
                ne(variables['skipContainerScan'], 'true')
              )
            inputs:
              sarifFile: $(Build.SourcesDirectory)/trivy-container.sarif

  # ---------------------------------------------------------------------------
  # Stage 5: DAST - ZAP Baseline Scan
  # ---------------------------------------------------------------------------
  - stage: DAST
    displayName: DAST - ZAP Scan
    dependsOn: []
    condition: and(succeeded(), ne(variables['DAST_TARGET_URL'], ''))
    jobs:
      - job: ZAPScan
        displayName: ZAP Baseline Scan
        steps:
          - checkout: self

          - script: |
              docker run --rm \
                -v $(Build.SourcesDirectory):/zap/wrk \
                owasp/zap2docker-stable \
                zap-baseline.py \
                  -t $(DAST_TARGET_URL) \
                  -J zap-report.json
            displayName: ZAP Baseline Scan
            continueOnError: true

          - script: |
              npm install -g @microsoft/sarif-multitool
              if [ -f zap-report.json ]; then
                sarif-multitool convert zap-report.json --tool ZAP --output zap-results.sarif
              fi
            displayName: Convert ZAP JSON to SARIF
            condition: always()

          - task: AdvancedSecurity-Publish@1
            displayName: Publish DAST SARIF
            condition: always()
            inputs:
              sarifFile: $(Build.SourcesDirectory)/zap-results.sarif

  # ---------------------------------------------------------------------------
  # Stage 6: Secret Scanning Configuration
  # ---------------------------------------------------------------------------
  # Secret scanning and push protection are configured at the repository level
  # in ADO under Project Settings > Repos > Advanced Security.
  # No pipeline task is required; GHAzDO monitors pushes automatically.
  #
  # To enable:
  # 1. Navigate to Project Settings > Repos > Advanced Security
  # 2. Enable "Secret Protection" for the repository
  # 3. Enable "Push Protection" to block secrets at push time
  # 4. Configure custom patterns if needed
